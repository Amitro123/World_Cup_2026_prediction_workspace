name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff mypy

      - name: Lint (ruff)
        run: ruff check src/ *.py tests/

      - name: Type-check the engine (mypy --strict)
        run: mypy --strict src/engine.py

      - name: Run test suite
        run: pytest tests/ -q

      - name: Smoke-check the backtest harness
        run: python -m src.backtest --json > /dev/null

      - name: Assert holdouts are leakage-free
        run: python -m src.backtest --leakage
